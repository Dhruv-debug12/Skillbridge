<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillBridge | Job Board</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/job-board.css">
  <script src="js/theme.js"></script>
</head>
<body class="fade-in">
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="nav-brand" style="display:flex;align-items:center;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#C89D42" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.5rem;flex-shrink:0;">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <path d="M8 14v-2"></path>
          <path d="M12 14v-5"></path>
          <path d="M16 14v-8"></path>
          <polyline points="5 13 9 9 12 11 17 5"></polyline>
          <polyline points="13 5 17 5 17 9"></polyline>
        </svg>
SkillBridge</a>
      <div class="nav-links">
        <a href="job-board.html" class="nav-link active">Find Jobs</a>
        <a href="index.html#how-it-works" class="nav-link">How it Works</a>
        <a href="index.html#trades" class="nav-link">Trades</a>
      </div>
      <div class="nav-actions" id="nav-actions">
        <!-- JS inserts auth state here -->
        <a href="auth.html" class="btn btn-text">Sign In</a>
        <a href="auth.html?role=employer" class="btn btn-primary">Post a Job</a>
      </div>
      <button class="theme-toggle" aria-label="Toggle Theme"></button>
    </div>
  </nav>

  <main class="page-wrapper container">
    <div class="job-board-layout">
      <!-- Sidebar Filters -->
      <aside class="filters-sidebar section-tight">
        <h3 class="mb-2 text-xl font-display">Filters</h3>
        <form id="filter-form">
          <div class="form-group">
            <label class="form-label">Search</label>
            <input type="text" name="search" class="form-input" placeholder="Keyword or location...">
          </div>
          
          <div class="form-group">
            <label class="form-label">Trade Category</label>
            <select name="trade_category" class="form-select">
              <option value="">All Trades</option>
              <option value="Electrician">Electrician</option>
              <option value="Plumber">Plumber</option>
              <option value="Carpenter">Carpenter</option>
              <option value="Mason">Mason</option>
              <option value="Painter">Painter</option>
              <option value="Driver">Driver</option>
              <option value="Welder">Welder</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Pay Type</label>
            <select name="pay_type" class="form-select">
              <option value="">Any</option>
              <option value="hourly">Hourly</option>
              <option value="daily">Daily</option>
              <option value="fixed">Fixed Project</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;">Apply Filters</button>
        </form>
      </aside>

      <!-- Main Results -->
      <section class="results-content section-tight">
        <div class="flex-between mb-4">
          <div>
            <h1 class="text-3xl font-display mb-1">Open Roles</h1>
            <p class="text-muted"><span id="results-count">0</span> jobs found matching your criteria</p>
          </div>
          <a href="map-search.html" class="btn btn-outline" style="display:inline-flex;align-items:center;gap:0.5rem;white-space:nowrap;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3z"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
            Search by Map
          </a>
        </div>

        <div class="grid grid-2" id="jobs-list">
          <!-- Jobs injected via JS -->
          <div class="skeleton" style="height:200px; width:100%;"></div>
          <div class="skeleton" style="height:200px; width:100%;"></div>
        </div>
      </section>
    </div>
  </main>

  <!-- Slide-in Drawer -->
  <div class="drawer-overlay" id="job-drawer-overlay">
    <div class="drawer-panel" id="job-drawer">
      <button class="drawer-close" id="job-drawer-close">&times;</button>
      <div id="drawer-content">
        <!-- Populated via JS -->
      </div>
    </div>
  </div>

  <script type="module" src="js/job-board.js"></script>
</body>
</html>
